include mocha.conf

font_family MonoLisa
bold_font auto
italic_font auto
bold_italic_font auto

font_size 12.0
disable_ligatures never

font_features MonoLisa +liga +calt +ss02 +ss11 +ss08 +ss09 +ss15 +ss17 +ss16 +ss14 +zero


disable_ligatures never

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

scrollback_lines 10000
scrollback_pager less --no-init --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

mouse_hide_wait 3.0
focus_follows_mouse no
copy_on_select clipboard

# Performance
repaint_delay 8
input_delay 3
sync_to_monitor yes

# Window
window_padding_width 0 
hide_window_decorations yes
confirm_os_window_close 0
background_opacity 0.93
dynamic_background_opacity yes

# Tabs
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {title} "
active_tab_font_style bold
inactive_tab_font_style normal

# URLs
url_style curly
url_color #89b4fa
open_url_with default
detect_urls yes

kitty_mod ctrl+shift

# Tabs
map kitty_mod+t new_tab_with_cwd
map kitty_mod+w close_tab
map kitty_mod+right next_tab
map kitty_mod+left previous_tab

# Splits / windows
map kitty_mod+enter new_window_with_cwd
map kitty_mod+] next_window
map kitty_mod+[ previous_window

# Font size
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+0 change_font_size all 0

# Opacity
map kitty_mod+a>m set_background_opacity +0.05
map kitty_mod+a>l set_background_opacity -0.05
map kitty_mod+a>1 set_background_opacity 1.0
