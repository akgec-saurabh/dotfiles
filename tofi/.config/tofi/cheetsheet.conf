### Keyboard Cheat Sheet Theme

font = "monospace"
font-size = 22

prompt-text = "󰌌  Shortcuts"
prompt-padding = 10

width = 70%
height = 70%
anchor = center

background-color = #1E1E2E
border-width = 4
border-color = #89B4FA
outline-width = 0
corner-radius = 12

padding-top = 20
padding-bottom = 20
padding-left = 20
padding-right = 20

### Results styling

default-result-color = #CDD6F4
default-result-background = #00000000

alternate-result-color = #A6ADC8
alternate-result-background = #00000000

selection-color = #1E1E2E
selection-background = #89B4FA
selection-background-padding = 4, 8
selection-background-corner-radius = 6

result-spacing = 6
num-results = 0

### Input disabled look
hide-input = true
require-match = false
text-cursor = false

### Make tofi act like a static overlay

hide-input = true
require-match = false
text-cursor = false
history = false

### Remove selection highlight
selection-background = #00000000
selection-color = #CDD6F4

### Optional: make all rows look identical
default-result-background = #1E1E2E
alternate-result-background = #1E1E2E
