# Tofi keyboard cheat sheet theme.
# Static overlay: input is hidden and rows are styled uniformly.

# Typography
font = "monospace"
font-size = 22

# Prompt
prompt-text = "󰌌  Shortcuts"
prompt-padding = 10

# Window
width = 70%
height = 70%
anchor = center

background-color = #1E1E2E
border-width = 4
border-color = #89B4FA
outline-width = 0
corner-radius = 12

padding-top = 20
padding-bottom = 20
padding-left = 20
padding-right = 20

# Results
default-result-color = #CDD6F4
default-result-background = #1E1E2E

alternate-result-color = #A6ADC8
alternate-result-background = #1E1E2E

selection-color = #CDD6F4
selection-background = #00000000

result-spacing = 6
num-results = 0

# Static overlay behavior
hide-input = true
require-match = false
text-cursor = false
history = false
