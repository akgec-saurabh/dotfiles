# ── General ────────────────────────────────────────────────────────────────────
general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 2                  # seconds before input is accepted
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

# ── Background ─────────────────────────────────────────────────────────────────
background {
    monitor = eDP-1
    path = /home/saurabh/Downloads/23827.jpg          # blurs current screen content
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ── Clock (large, centered) ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(220, 220, 220, 0.95)
    font_size = 96
    font_family = JetBrains Mono Light
    position = 0, 120
    halign = center
    valign = center
}

# ── Date ───────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(200, 200, 200, 0.60)
    font_size = 18
    font_family = JetBrains Mono Light
    position = 0, 30
    halign = center
    valign = center
}

# ── Password Input Field ────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1         # circle dots

    outer_color = rgba(255, 255, 255, 0.08)
    inner_color = rgba(255, 255, 255, 0.04)
    font_color = rgba(220, 220, 220, 0.90)
    fade_on_empty = true
    fade_timeout = 1200

    placeholder_text = <span foreground="##888888" font_size="14pt"></span>
    hide_input = false
    rounding = 8

    check_color = rgba(100, 220, 160, 0.85)
    fail_color = rgba(220, 100, 100, 0.85)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition = 300

    capslock_color = rgba(255, 200, 80, 0.85)

    position = 0, -100
    halign = center
    valign = center
}

# ── Lock icon / hint ────────────────────────────────────────────────────────────
label {
    monitor =
    text =   # nerd font lock icon
    color = rgba(180, 180, 180, 0.35)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, -58
    halign = center
    valign = center
}
