# #######################################################################################
# HYPRLAND MAIN CONFIG - Sources all modular config files
# https://wiki.hypr.land/Configuring/
# #######################################################################################

# ── Core ──────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/conf/variables.conf   # $terminal, $mainMod, env vars
source = ~/.config/hypr/conf/monitors.conf    # Monitor layout & resolution
source = ~/.config/hypr/conf/autostart.conf   # exec-once programs

# ── Look & Feel ───────────────────────────────────────────────────────────────
source = ~/.config/hypr/conf/appearance.conf  # general, decoration, animations
source = ~/.config/hypr/conf/layouts.conf     # dwindle, master, misc

# ── Input ─────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/conf/input.conf       # keyboard, mouse, touchpad, gestures

# ── Bindings ──────────────────────────────────────────────────────────────────
source = ~/.config/hypr/conf/keybinds.conf    # all bind / bindm / bindel / bindl

# ── Rules ─────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/conf/windowrules.conf # windowrule blocks
