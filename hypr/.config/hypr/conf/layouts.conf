# #######################################################################################
# LAYOUTS — Dwindle, Master, Misc options
# #######################################################################################

#############
### MISC  ###
#############

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1  # -1 = random anime mascot; 0 or 1 = disable
    disable_hyprland_logo   = false
}


###############
### DWINDLE ###
###############

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    pseudotile     = true  # Toggle with mainMod + P
    preserve_split = true
}


##############
### MASTER ###
##############

# https://wiki.hypr.land/Configuring/Master-Layout/
master {
    new_status = master
}


