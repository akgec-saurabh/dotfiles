# #######################################################################################
# KEYBINDINGS
# https://wiki.hypr.land/Configuring/Binds/
# $mainMod and app variables are defined in variables.conf
# #######################################################################################


##################
### APPS / WM  ###
##################

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, R,      exec, rofi -show drun
bind = $mainMod, C,      exec, ~/.config/hypr/scripts/camera.sh

bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo          # dwindle: toggle pseudotiling
bind = $mainMod, T, layoutmsg, togglesplit  # dwindle: toggle split direction

# Power menu
bind = $mainMod,       M, exec, ~/.config/hypr/scripts/powermenu.sh

# Hard exit — hyprshutdown if installed, fallback to hyprctl exit
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

###############
### WAYBAR  ###
###############

bind = $mainMod,       W, exec, ~/.config/hypr/scripts/waybar.sh
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/waybar.sh restart


###################
### SCREENSHOTS ###
###################

bind = ,         Print, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh full


##############
### FOCUS  ###
##############

# Vim-style focus movement
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d


############
### LOCK ###
############

# Using CTRL+L to avoid conflict with vim focus (SHIFT+L = uppercase L = same key as l)
bind = $mainMod CTRL, L, exec, hyprlock


####################
### WORKSPACES   ###
####################

# Switch to workspace by number
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace by number
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Vim-style relative workspace navigation
bind = $mainMod ALT,       l, workspace,       e+1
bind = $mainMod ALT,       h, workspace,       e-1

# Move window to adjacent workspace and follow it there
bind = $mainMod ALT SHIFT, l, movetoworkspace, e+1
bind = $mainMod ALT SHIFT, h, movetoworkspace, e-1

# Scroll through workspaces with mouse wheel (hold mainMod)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Scratchpad — a hidden special workspace
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic


#########################
### MOUSE MOVE/RESIZE ###
#########################

bindm = $mainMod, mouse:272, movewindow    # LMB drag — move window
bindm = $mainMod, mouse:273, resizewindow  # RMB drag — resize window


###############
### MEDIA   ###
###############

# Volume control (repeatable while held)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control (repeatable while held)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media playback — works even when screen is locked (bindl)
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
