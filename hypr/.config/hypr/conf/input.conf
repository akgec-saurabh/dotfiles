# #######################################################################################
# INPUT — Keyboard, mouse, touchpad, gestures, per-device config
# https://wiki.hypr.land/Configuring/Variables/#input
# #######################################################################################

###############
### KEYBOARD ###
###############

input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0  # -1.0 – 1.0, 0 = no modification

    touchpad {
        natural_scroll = true
    }
}


################
### GESTURES ###
################

# https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace


####################
### PER-DEVICE   ###
####################

# https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs
device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}
